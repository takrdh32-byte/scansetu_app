name: Build ScanSetu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Force fresh Flutter project
        run: |
          rm -rf android ios web windows linux macos
          flutter create --org com.scansetu --platforms android .

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scansetu-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk