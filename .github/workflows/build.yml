name: Build ScanSetu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter scaffold if missing
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --org com.scansetu --project-name scansetu_app --platforms android tmp_project
            cp -n tmp_project/pubspec.yaml . || true
            cp -rn tmp_project/lib . || true
            cp -rn tmp_project/android/gradle . || true
            cp -n tmp_project/android/build.gradle android/ || true
            cp -n tmp_project/android/settings.gradle android/ || true
            cp -n tmp_project/android/gradle.properties android/ || true
            cp -n tmp_project/android/gradlew android/ || true
            cp -n tmp_project/android/gradlew.bat android/ || true
            cp -n tmp_project/android/local.properties android/ || true 2>/dev/null || true
            rm -rf tmp_project
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scansetu-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk